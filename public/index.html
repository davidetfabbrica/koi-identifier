<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi Identifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background: #F1EFEB;
            min-height: 100vh;
            color: #1a1a18;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        header {
            background: #F1EFEB;
            border-bottom: 1px solid #E5E3DE;
            padding: 24px 0;
            position: sticky;
            top: 0;
            z-index: 40;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .header-title:hover {
            opacity: 0.7;
        }
        
        .header-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        
        .header-title .emoji {
            font-size: 32px;
        }
        
        .header-title h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a18;
            letter-spacing: 0.5px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-family: 'Lora', serif;
        }
        
        .btn-primary {
            background: #8B3A2A;
            color: #F1EFEB;
        }
        
        .btn-primary:hover {
            background: #6b2d22;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 58, 42, 0.2);
        }
        
        .btn-secondary {
            background: #E5E3DE;
            color: #1a1a18;
            border: 1px solid #D5D3CE;
        }
        
        .btn-secondary:hover {
            background: #D5D3CE;
        }
        
        .btn-success {
            background: #8B3A2A;
            color: #F1EFEB;
        }
        
        .btn-success:hover {
            background: #6b2d22;
        }
        
        .btn-danger {
            background: #E5E3DE;
            color: #8B3A2A;
            border: 1px solid #D5D3CE;
        }
        
        .btn-danger:hover {
            background: #D5D3CE;
        }
        
        .search-filter {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-wrapper input {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 1px solid #D5D3CE;
            border-radius: 4px;
            color: #1a1a18;
            font-size: 14px;
            font-family: 'Lora', serif;
        }
        
        .search-wrapper input::placeholder {
            color: #999;
        }
        
        .search-wrapper input:focus {
            outline: none;
            border-color: #8B3A2A;
            box-shadow: 0 0 0 3px rgba(139, 58, 42, 0.1);
        }
        
        select {
            padding: 12px 16px;
            background: white;
            border: 1px solid #D5D3CE;
            border-radius: 4px;
            color: #1a1a18;
            font-size: 14px;
            font-family: 'Lora', serif;
        }
        
        select:focus {
            outline: none;
            border-color: #8B3A2A;
            box-shadow: 0 0 0 3px rgba(139, 58, 42, 0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-state h2 {
            font-family: 'Shippori Mincho', serif;
            font-size: 24px;
            color: #1a1a18;
            margin-bottom: 16px;
        }
        
        .empty-state p {
            color: #666;
            margin-bottom: 32px;
            font-size: 16px;
        }
        
        .fish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .fish-card {
            background: white;
            border: 1px solid #E5E3DE;
            border-radius: 4px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .fish-card:hover {
            border-color: #8B3A2A;
            box-shadow: 0 8px 24px rgba(139, 58, 42, 0.1);
            transform: translateY(-4px);
        }
        
        .fish-image {
            width: 100%;
            height: 200px;
            border-radius: 4px;
            object-fit: cover;
            margin-bottom: 16px;
            background: #E5E3DE;
        }
        
        .fish-name {
            font-family: 'Shippori Mincho', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a18;
            margin-bottom: 4px;
        }
        
        .fish-id {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
            background: #F5F3EE;
            color: #8B3A2A;
            border: 1px solid #E5E3DE;
        }
        
        .fish-markings {
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
        
        .form {
            background: white;
            border: 1px solid #E5E3DE;
            border-radius: 4px;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .form h2 {
            font-family: 'Shippori Mincho', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a18;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: #1a1a18;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 1px solid #D5D3CE;
            border-radius: 4px;
            color: #1a1a18;
            font-size: 14px;
            font-family: 'Lora', serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B3A2A;
            box-shadow: 0 0 0 3px rgba(139, 58, 42, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }
        
        .form-buttons button {
            flex: 1;
        }
        
        .upload-area {
            border: 2px dashed #D5D3CE;
            border-radius: 4px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            background: #FAFAF8;
            transition: all 0.3s;
            color: #666;
        }
        
        .upload-area:hover {
            border-color: #8B3A2A;
            background: #F5F3EE;
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .preview-image {
            width: 100%;
            max-height: 300px;
            border-radius: 4px;
            object-fit: cover;
            margin-top: 16px;
        }
        
        .analysis-result {
            padding: 16px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .analysis-result.loading {
            background: #F5F3EE;
            border: 1px solid #D5D3CE;
            color: #1a1a18;
        }
        
        .analysis-result.success {
            background: #F0EBE6;
            border: 1px solid #E5D9CC;
            color: #6b2d22;
        }
        
        .analysis-result.warning {
            background: #FEF3EB;
            border: 1px solid #F0E3D8;
            color: #8B3A2A;
        }
        
        .analysis-result.error {
            background: #FBE5E3;
            border: 1px solid #F5D7D3;
            color: #8B3A2A;
        }
        
        .hidden {
            display: none;
        }
        
        .detail-view {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .detail-card {
            background: white;
            border: 1px solid #E5E3DE;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            padding: 32px;
        }
        
        @media (max-width: 768px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }
        
        .detail-image {
            width: 100%;
            height: 300px;
            border-radius: 4px;
            object-fit: cover;
            background: #E5E3DE;
        }
        
        .detail-info h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a18;
            margin-bottom: 16px;
        }
        
        .detail-info h3 {
            font-family: 'Shippori Mincho', serif;
            font-size: 14px;
            font-weight: 700;
            color: #1a1a18;
            margin-top: 20px;
            margin-bottom: 8px;
        }
        
        .detail-info p {
            color: #1a1a18;
            font-size: 14px;
        }
        
        .sighting-item {
            padding: 8px 0;
            border-bottom: 1px solid #E5E3DE;
            font-size: 12px;
        }
        
        .sighting-item:last-child {
            border-bottom: none;
        }
        
        .detail-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        
        .detail-buttons button {
            width: 100%;
        }
    </style>
</head>
<body>
    <header>

            <div class="header-title" onclick="showMainView()">
                <svg class="header-logo" viewBox="0 0 1512 1512" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">

                                    </g>

                                    <g transform="matrix(1,0,0,1,0.099739,-0.026372)">

                <h1>Koi Identifier</h1>
            </div>
            <div id="headerButton"></div>
        </div>
    </header>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <div id="searchFilter" class="search-filter hidden">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search by name or ID..." onkeyup="filterFish()">
                </div>
                <select id="breedFilter" onchange="filterFish()">
                    <option value="all">All Breeds</option>
                    <option value="Kohaku">Kohaku</option>
                    <option value="Sanke">Sanke</option>
                    <option value="Showa">Showa</option>
                    <option value="Utsuri">Utsuri</option>
                    <option value="Bekko">Bekko</option>
                    <option value="Asagi">Asagi</option>
                    <option value="Shusui">Shusui</option>
                    <option value="Tancho">Tancho</option>
                    <option value="Metallic">Metallic</option>
                    <option value="Matsuba">Matsuba</option>
                    <option value="Kinginrin">Kinginrin</option>
                    <option value="Kawarimono">Kawarimono</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>

            <div id="fishContainer" class="fish-grid"></div>

            <div id="emptyState" class="empty-state">
                <h2>No fish cataloged yet</h2>
                <p>Start by adding your first koi to the collection</p>
                <button class="btn-primary" onclick="showAddForm()">+ Add Your First Fish</button>
            </div>
        </div>

        <!-- Add Form View -->
        <div id="addFormView" class="hidden">
            <div class="form">
                <h2>Add New Koi</h2>
                <form onsubmit="saveFish(event)">
                    <div class="form-group">
                        <label>Fish Name/ID *</label>
                        <input type="text" id="fishName" placeholder="e.g., 'Ruby', 'Fish #5'" required>
                    </div>

                    <div class="form-group">
                        <label>Breed</label>
                        <select id="fishBreed">
                            <option value="Unknown">Unknown</option>
                            <option value="Kohaku">Kohaku</option>
                            <option value="Sanke">Sanke</option>
                            <option value="Showa">Showa</option>
                            <option value="Utsuri">Utsuri</option>
                            <option value="Bekko">Bekko</option>
                            <option value="Asagi">Asagi</option>
                            <option value="Shusui">Shusui</option>
                            <option value="Tancho">Tancho</option>
                            <option value="Metallic">Metallic</option>
                            <option value="Matsuba">Matsuba</option>
                            <option value="Kinginrin">Kinginrin</option>
                            <option value="Kawarimono">Kawarimono</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Distinctive Markings</label>
                        <input type="text" id="fishMarkings" placeholder="e.g., 'Red spot on left side, white belly'">
                    </div>

                    <div class="form-group">
                        <label>Photo</label>
                        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
                            📷 Click to upload photo
                            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)">
                        </div>
                        <img id="photoPreview" class="preview-image hidden">
                        <div id="analysisResult" class="hidden"></div>
                    </div>

                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="fishNotes" placeholder="Any other details about this fish..."></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-success">✓ Save Fish</button>
                        <button type="button" class="btn-secondary" onclick="showMainView()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden">
            <div class="detail-view">
                <div class="detail-card">
                    <div class="detail-content">
                        <div>
                            <img id="detailImage" class="detail-image hidden">
                            <div style="background: white; border: 1px solid #E5E3DE; border-radius: 4px; padding: 16px; margin-top: 16px; font-size: 13px;">
                                <p style="font-weight: 600; color: #1a1a18; margin-bottom: 8px;">Collection Info</p>
                                <p>Added: <span id="detailDateAdded"></span></p>
                                <p>Fish ID: <span id="detailFishId"></span></p>
                                <p>Times spotted: <span id="detailSightings"></span></p>
                            </div>
                        </div>
                        
                        <div class="detail-info">
                            <h1 id="detailName"></h1>
                            <div style="margin-bottom: 24px;">
                                <span class="badge" id="detailBreed"></span>
                            </div>

                            <div id="detailMarkingsSection" class="hidden">
                                <h3>Distinctive Markings</h3>
                                <p id="detailMarkings"></p>
                            </div>

                            <div id="detailNotesSection" class="hidden">
                                <h3>Notes</h3>
                                <p id="detailNotes"></p>
                            </div>

                            <div id="detailSightingsSection" class="hidden">
                                <h3>Sighting History</h3>
                                <div id="detailSightingsList"></div>
                            </div>

                            <div class="detail-buttons">
                                <button class="btn-success" onclick="logSighting()">Log Sighting</button>
                                <button class="btn-primary" onclick="showMainView()">← Collection</button>
                                <button class="btn-danger" onclick="deleteFish()">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allFish = [];
        let currentSelectedId = null;
        const API_BASE_URL = window.location.hostname.includes('localhost') 
            ? 'http://localhost:3001'
            : '/api';

        const breeds = ['Kohaku', 'Sanke', 'Showa', 'Utsuri', 'Bekko', 'Asagi', 'Shusui', 'Tancho', 'Metallic', 'Matsuba', 'Kinginrin', 'Kawarimono', 'Unknown'];

        // Load fish from backend on page load
        async function loadFish() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/fish`);
                if (response.ok) {
                    allFish = await response.json();
                } else {
                    console.error('Failed to load fish from backend');
                    allFish = [];
                }
            } catch (err) {
                console.error('Error loading fish:', err);
                allFish = [];
            }
            renderFish();
            updateHeaderButton('main');
        }

        function saveFish(e) {
            e.preventDefault();
            
            const newFish = {
                name: document.getElementById('fishName').value,
                breed: document.getElementById('fishBreed').value,
                markings: document.getElementById('fishMarkings').value,
                notes: document.getElementById('fishNotes').value,
                photoUrl: document.getElementById('photoPreview').src || null,
                dateAdded: new Date().toLocaleDateString()
            };

            // POST to backend database
            fetch(`${API_BASE_URL}/api/fish`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(newFish)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('Error saving fish: ' + data.error);
                    return;
                }
                
                // Log initial sighting and WAIT for it to complete
                const initialSighting = {
                    date: new Date().toLocaleDateString(),
                    location: 'Initial upload'
                };
                
                return fetch(`${API_BASE_URL}/api/fish/${data.id}/sighting`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(initialSighting)
                });
            })
            .then(res => {
                // Reset form
                document.getElementById('fishName').value = '';
                document.getElementById('fishBreed').value = 'Unknown';
                document.getElementById('fishMarkings').value = '';
                document.getElementById('fishNotes').value = '';
                document.getElementById('photoPreview').src = '';
                document.getElementById('photoPreview').classList.add('hidden');
                document.getElementById('photoInput').value = '';
                document.getElementById('analysisResult').classList.add('hidden');
                
                // Reload fish from database and show collection
                loadFish();
                showMainView();
            })
            .catch(err => {
                console.error('Error saving fish:', err);
                alert('Network error saving fish');
            });
        }

        function previewPhoto(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('photoPreview');
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    
                    analyzePhotoForDuplicates(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        async function analyzePhotoForDuplicates(photoDataUrl) {
            const analysisResult = document.getElementById('analysisResult');
            
            // Determine image type from base64 header
            let mediaType = 'image/jpeg';
            if (photoDataUrl.startsWith('data:image/png')) {
                mediaType = 'image/png';
            } else if (photoDataUrl.startsWith('data:image/gif')) {
                mediaType = 'image/gif';
            } else if (photoDataUrl.startsWith('data:image/webp')) {
                mediaType = 'image/webp';
            }

            const base64Image = photoDataUrl.split(',')[1];

            // Show loading state
            analysisResult.innerHTML = '<div class="analysis-result loading">🔍 Analyzing photo...</div>';
            analysisResult.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/api/analyze-koi`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        photoBase64: base64Image,
                        existingFish: allFish
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    analysisResult.innerHTML = `<div class="analysis-result error">⚠️ ${errorData.error || 'Could not analyze photo'}</div>`;
                    return;
                }

                const analysis = await response.json();

                if (analysis.isNewFish) {
                    analysisResult.innerHTML = `<div class="analysis-result success">
                        <strong>✓ New Fish Detected!</strong><br>
                        Features: ${analysis.description}<br>
                        <strong>Suggested Breed:</strong> ${analysis.suggestedBreed}<br>
                        <em style="opacity: 0.8;">Confidence: ${analysis.confidence}%</em>
                    </div>`;
                    document.getElementById('fishBreed').value = analysis.suggestedBreed;
                } else {
                    analysisResult.innerHTML = `<div class="analysis-result warning">
                        <strong>⚠️ Possible Match: ${analysis.matchedFishId}</strong><br>
                        This koi might already be in your collection<br>
                        ${analysis.reasoning}<br>
                        <em style="opacity: 0.8;">Confidence: ${analysis.confidence}%</em>
                    </div>`;
                }
            } catch (error) {
                console.error('Photo analysis error:', error);
                analysisResult.innerHTML = '<div class="analysis-result error">⚠️ Network error analyzing photo. You can still add the fish manually.</div>';
            }
        }

        function updateHeaderButton(view) {
            const headerButton = document.getElementById('headerButton');
            if (view === 'main') {
                headerButton.innerHTML = '<button class="btn-primary" onclick="showAddForm()">+ Add Fish</button>';
            } else if (view === 'add' || view === 'detail') {
                headerButton.innerHTML = '<button class="btn-primary" onclick="showMainView()">← Collection</button>';
            }
        }

        function renderFish() {
            const container = document.getElementById('fishContainer');
            const empty = document.getElementById('emptyState');
            const searchFilter = document.getElementById('searchFilter');
            
            const filtered = filterFishArray();

            if (allFish.length === 0) {
                empty.classList.remove('hidden');
                searchFilter.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            empty.classList.add('hidden');
            searchFilter.classList.remove('hidden');

            if (filtered.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #999;">No matches found</div>';
                return;
            }

            container.innerHTML = filtered.map(fish => `
                <div class="fish-card" onclick="showDetail(${fish.id})">
                    ${fish.photoUrl ? `<img src="${fish.photoUrl}" class="fish-image" alt="${fish.name}">` : ''}
                    <div class="fish-name">${fish.name}</div>
                    <div class="fish-id">ID: ${fish.id}</div>
                    <div>
                        <span class="badge">${fish.breed}</span>
                        ${fish.sightings && fish.sightings.length > 1 ? `<span class="badge">${fish.sightings.length} sightings</span>` : ''}
                    </div>
                    ${fish.markings ? `<div class="fish-markings">${fish.markings}</div>` : ''}
                </div>
            `).join('');
        }

        function filterFishArray() {
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const breed = document.getElementById('breedFilter')?.value || 'all';

            return allFish.filter(fish => {
                const matchesSearch = fish.name.toLowerCase().includes(search) || fish.id.toString().includes(search);
                const matchesBreed = breed === 'all' || fish.breed === breed;
                return matchesSearch && matchesBreed;
            });
        }

        function filterFish() {
            renderFish();
        }

        function showAddForm() {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('addFormView').classList.remove('hidden');
            updateHeaderButton('add');
        }

        function showMainView() {
            document.getElementById('addFormView').classList.add('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            renderFish();
            updateHeaderButton('main');
        }

        function showDetail(id) {
            currentSelectedId = id;
            const fish = allFish.find(f => f.id === id);
            if (!fish) return;

            document.getElementById('detailName').textContent = fish.name;
            document.getElementById('detailBreed').textContent = fish.breed;
            document.getElementById('detailFishId').textContent = fish.id;
            document.getElementById('detailDateAdded').textContent = fish.dateAdded;
            document.getElementById('detailSightings').textContent = fish.sightings?.length || 1;

            if (fish.photoUrl) {
                document.getElementById('detailImage').src = fish.photoUrl;
                document.getElementById('detailImage').classList.remove('hidden');
            } else {
                document.getElementById('detailImage').classList.add('hidden');
            }

            if (fish.markings) {
                document.getElementById('detailMarkings').textContent = fish.markings;
                document.getElementById('detailMarkingsSection').classList.remove('hidden');
            } else {
                document.getElementById('detailMarkingsSection').classList.add('hidden');
            }

            if (fish.notes) {
                document.getElementById('detailNotes').textContent = fish.notes;
                document.getElementById('detailNotesSection').classList.remove('hidden');
            } else {
                document.getElementById('detailNotesSection').classList.add('hidden');
            }

            if (fish.sightings && fish.sightings.length > 0) {
                document.getElementById('detailSightingsList').innerHTML = fish.sightings.map(s => 
                    `<div class="sighting-item">• ${s.date} - ${s.location}</div>`
                ).join('');
                document.getElementById('detailSightingsSection').classList.remove('hidden');
            } else {
                document.getElementById('detailSightingsSection').classList.add('hidden');
            }

            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('addFormView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            updateHeaderButton('detail');
        }

        function logSighting() {
            const sighting = {
                date: new Date().toLocaleDateString(),
                location: 'Park'
            };

            fetch(`${API_BASE_URL}/api/fish/${currentSelectedId}/sighting`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(sighting)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('Error logging sighting: ' + data.error);
                    return;
                }
                // Reload fish data to show updated sightings
                loadFish();
                showDetail(currentSelectedId);
            })
            .catch(err => {
                console.error('Error logging sighting:', err);
                alert('Network error logging sighting');
            });
        }

        function deleteFish() {
            if (confirm('Are you sure you want to delete this fish?')) {
                fetch(`${API_BASE_URL}/api/fish/${currentSelectedId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert('Error deleting fish: ' + data.error);
                        return;
                    }
                    loadFish();
                    showMainView();
                })
                .catch(err => {
                    console.error('Error deleting fish:', err);
                    alert('Network error deleting fish');
                });
            }
        }

        // Initial render - load fish from backend
        loadFish();
    </script>
</body>
</html>

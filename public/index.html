<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi Identifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e0f2fe;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        header {
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
            padding: 24px 0;
            margin-bottom: 32px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 40;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-title .emoji {
            font-size: 40px;
        }
        
        .header-title h1 {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(to right, #93c5fd, #06b6d4, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
        
        .btn-primary {
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            color: white;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(to right, #2563eb, #0891b2);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
        }
        
        .btn-secondary {
            background: rgba(30, 58, 95, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #93c5fd;
        }
        
        .btn-secondary:hover {
            background: rgba(30, 58, 95, 0.7);
        }
        
        .btn-success {
            background: #06b6d4;
            color: white;
        }
        
        .btn-success:hover {
            background: #0891b2;
        }
        
        .btn-danger {
            background: rgba(127, 29, 29, 0.3);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fca5a5;
        }
        
        .btn-danger:hover {
            background: rgba(127, 29, 29, 0.5);
        }
        
        .search-filter {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-wrapper input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 58, 95, 0.3);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            color: #e0f2fe;
            font-size: 15px;
        }
        
        .search-wrapper input::placeholder {
            color: rgba(147, 197, 253, 0.4);
        }
        
        .search-wrapper input:focus {
            outline: none;
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(30, 58, 95, 0.5);
        }
        
        select {
            padding: 12px 16px;
            background: rgba(30, 58, 95, 0.3);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            color: #e0f2fe;
            font-size: 15px;
        }
        
        select:focus {
            outline: none;
            border-color: rgba(6, 182, 212, 0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-state h2 {
            font-size: 24px;
            color: rgba(191, 219, 254, 0.7);
            margin-bottom: 16px;
        }
        
        .empty-state p {
            color: rgba(147, 197, 253, 0.5);
            margin-bottom: 32px;
            font-size: 16px;
        }
        
        .fish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .fish-card {
            background: linear-gradient(to bottom right, rgba(30, 58, 95, 0.4), rgba(30, 41, 59, 0.2));
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .fish-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(30, 58, 95, 0.6);
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.1);
            transform: translateY(-4px);
        }
        
        .fish-image {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 16px;
            background: rgba(30, 58, 95, 0.5);
        }
        
        .fish-name {
            font-size: 18px;
            font-weight: bold;
            color: #e0f2fe;
            margin-bottom: 4px;
        }
        
        .fish-id {
            font-size: 13px;
            color: rgba(147, 197, 253, 0.7);
            margin-bottom: 12px;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .badge-breed {
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: #67e8f9;
        }
        
        .badge-sightings {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }
        
        .fish-markings {
            font-size: 13px;
            color: rgba(147, 197, 253, 0.6);
            font-style: italic;
        }
        
        .form {
            background: linear-gradient(to bottom right, rgba(30, 58, 95, 0.4), rgba(30, 41, 59, 0.2));
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .form h2 {
            font-size: 28px;
            font-weight: bold;
            color: #e0f2fe;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: #93c5fd;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 58, 95, 0.3);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            color: #e0f2fe;
            font-size: 15px;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(30, 58, 95, 0.5);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }
        
        .form-buttons button {
            flex: 1;
        }
        
        .upload-area {
            border: 2px dashed rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            background: rgba(30, 58, 95, 0.2);
            transition: all 0.3s;
            color: #93c5fd;
        }
        
        .upload-area:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(30, 58, 95, 0.4);
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .preview-image {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: cover;
            margin-top: 16px;
        }
        
        .analysis-result {
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .analysis-result.loading {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }
        
        .analysis-result.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        
        .analysis-result.warning {
            background: rgba(251, 146, 60, 0.2);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: #fed7aa;
        }
        
        .analysis-result.error {
            background: rgba(244, 63, 94, 0.2);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fca5a5;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-title">
                <div class="emoji">🐠</div>
                <div>
                    <h1>Koi Identifier</h1>
                </div>
            </div>
            <button class="btn-primary" onclick="showAddForm()">+ Add Fish</button>
        </div>
    </header>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <div id="searchFilter" class="search-filter hidden">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search by name or ID..." onkeyup="filterFish()">
                </div>
                <select id="breedFilter" onchange="filterFish()">
                    <option value="all">All Breeds</option>
                    <option value="Kohaku">Kohaku</option>
                    <option value="Sanke">Sanke</option>
                    <option value="Showa">Showa</option>
                    <option value="Utsuri">Utsuri</option>
                    <option value="Bekko">Bekko</option>
                    <option value="Asagi">Asagi</option>
                    <option value="Shusui">Shusui</option>
                    <option value="Tancho">Tancho</option>
                    <option value="Metallic">Metallic</option>
                    <option value="Matsuba">Matsuba</option>
                    <option value="Kinginrin">Kinginrin</option>
                    <option value="Kawarimono">Kawarimono</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>

            <div id="fishContainer" class="fish-grid"></div>

            <div id="emptyState" class="empty-state">
                <h2>No fish cataloged yet</h2>
                <p>Start by adding your first koi to the collection</p>
                <button class="btn-primary" onclick="showAddForm()">+ Add Your First Fish</button>
            </div>
        </div>

        <!-- Add Form View -->
        <div id="addFormView" class="hidden">
            <div class="form">
                <h2>Add New Koi</h2>
                <form onsubmit="saveFish(event)">
                    <div class="form-group">
                        <label>Fish Name/ID *</label>
                        <input type="text" id="fishName" placeholder="e.g., 'Ruby', 'Fish #5'" required>
                    </div>

                    <div class="form-group">
                        <label>Breed</label>
                        <select id="fishBreed">
                            <option value="Unknown">Unknown</option>
                            <option value="Kohaku">Kohaku</option>
                            <option value="Sanke">Sanke</option>
                            <option value="Showa">Showa</option>
                            <option value="Utsuri">Utsuri</option>
                            <option value="Bekko">Bekko</option>
                            <option value="Asagi">Asagi</option>
                            <option value="Shusui">Shusui</option>
                            <option value="Tancho">Tancho</option>
                            <option value="Metallic">Metallic</option>
                            <option value="Matsuba">Matsuba</option>
                            <option value="Kinginrin">Kinginrin</option>
                            <option value="Kawarimono">Kawarimono</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Distinctive Markings</label>
                        <input type="text" id="fishMarkings" placeholder="e.g., 'Red spot on left side, white belly'">
                    </div>

                    <div class="form-group">
                        <label>Photo</label>
                        <div class="upload-area" onclick="document.getElementById('photoInput').click()">
                            📷 Click to upload photo
                            <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(event)">
                        </div>
                        <img id="photoPreview" class="preview-image hidden">
                        <div id="analysisResult" class="hidden"></div>
                    </div>

                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="fishNotes" placeholder="Any other details about this fish..."></textarea>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-success">✓ Save Fish</button>
                        <button type="button" class="btn-secondary" onclick="showMainView()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden">
            <button style="color: #93c5fd; background: none; border: none; cursor: pointer; margin-bottom: 24px; font-size: 15px;" onclick="showMainView()">← Back to Collection</button>
            
            <div style="background: linear-gradient(to bottom right, rgba(30, 58, 95, 0.4), rgba(30, 41, 59, 0.2)); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 12px; overflow: hidden;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 32px;">
                    <div>
                        <img id="detailImage" class="hidden" style="width: 100%; border-radius: 8px; margin-bottom: 16px;">
                        <div style="background: rgba(30, 58, 95, 0.3); border: 1px solid rgba(96, 165, 250, 0.3); border-radius: 8px; padding: 16px; color: rgba(147, 197, 253, 0.7); font-size: 13px;">
                            <p style="font-weight: 600; color: #93c5fd; margin-bottom: 8px;">Collection Info</p>
                            <p>Added: <span id="detailDateAdded"></span></p>
                            <p>Fish ID: <span id="detailFishId"></span></p>
                            <p>Times spotted: <span id="detailSightings"></span></p>
                        </div>
                    </div>
                    
                    <div>
                        <h1 id="detailName" style="font-size: 32px; font-weight: bold; color: #e0f2fe; margin-bottom: 16px;"></h1>
                        <div style="margin-bottom: 24px;">
                            <span class="badge badge-breed" id="detailBreed"></span>
                        </div>

                        <div id="detailMarkingsSection" class="hidden" style="margin-bottom: 24px;">
                            <h3 style="color: #93c5fd; font-weight: 600; margin-bottom: 8px;">Distinctive Markings</h3>
                            <p id="detailMarkings" style="color: #bfdbfe;"></p>
                        </div>

                        <div id="detailNotesSection" class="hidden" style="margin-bottom: 24px;">
                            <h3 style="color: #93c5fd; font-weight: 600; margin-bottom: 8px;">Notes</h3>
                            <p id="detailNotes" style="color: #bfdbfe;"></p>
                        </div>

                        <div id="detailSightingsSection" class="hidden" style="margin-bottom: 24px;">
                            <h3 style="color: #93c5fd; font-weight: 600; margin-bottom: 8px;">Sighting History</h3>
                            <div id="detailSightingsList" style="font-size: 13px; color: #bfdbfe;"></div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <button class="btn-success" onclick="logSighting()">Log Sighting</button>
                            <button class="btn-danger" onclick="deleteFish()">Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allFish = JSON.parse(localStorage.getItem('koiFish')) || [];
        let currentSelectedId = null;
        const API_BASE_URL = window.location.hostname.includes('localhost') 
            ? 'http://localhost:3001'
            : 'https://koi-identifier.vercel.app/api';
            

        const breeds = ['Kohaku', 'Sanke', 'Showa', 'Utsuri', 'Bekko', 'Asagi', 'Shusui', 'Tancho', 'Metallic', 'Matsuba', 'Kinginrin', 'Kawarimono', 'Unknown'];

        function saveFish(e) {
            e.preventDefault();
            
            const newFish = {
                id: Date.now(),
                name: document.getElementById('fishName').value,
                breed: document.getElementById('fishBreed').value,
                markings: document.getElementById('fishMarkings').value,
                notes: document.getElementById('fishNotes').value,
                photoUrl: document.getElementById('photoPreview').src || null,
                dateAdded: new Date().toLocaleDateString(),
                sightings: [{ date: new Date().toLocaleDateString(), location: 'Initial upload' }]
            };

            allFish.push(newFish);
            localStorage.setItem('koiFish', JSON.stringify(allFish));
            
            // Reset form
            document.getElementById('fishName').value = '';
            document.getElementById('fishBreed').value = 'Unknown';
            document.getElementById('fishMarkings').value = '';
            document.getElementById('fishNotes').value = '';
            document.getElementById('photoPreview').src = '';
            document.getElementById('photoPreview').classList.add('hidden');
            document.getElementById('photoInput').value = '';
            document.getElementById('analysisResult').classList.add('hidden');
            
            showMainView();
        }

        function previewPhoto(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('photoPreview');
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    
                    // Analyze the photo
                    analyzePhotoForDuplicates(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        async function analyzePhotoForDuplicates(photoDataUrl) {
            const analysisResult = document.getElementById('analysisResult');
            
            // Show loading state
            analysisResult.innerHTML = '<div class="analysis-result loading">🔍 Analyzing photo...</div>';
            analysisResult.classList.remove('hidden');

            try {
                const base64Image = photoDataUrl.split(',')[1];

                const response = await fetch(`${API_BASE_URL}/api/analyze-koi`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        photoBase64: base64Image,
                        existingFish: allFish
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    analysisResult.innerHTML = `<div class="analysis-result error">⚠️ ${errorData.error || 'Could not analyze photo'}</div>`;
                    return;
                }

                const analysis = await response.json();

                if (analysis.isNewFish) {
                    analysisResult.innerHTML = `<div class="analysis-result success">
                        <strong>✓ New Fish Detected!</strong><br>
                        Features: ${analysis.description}<br>
                        <em style="opacity: 0.8;">Confidence: ${analysis.confidence}%</em>
                    </div>`;
                } else {
                    analysisResult.innerHTML = `<div class="analysis-result warning">
                        <strong>⚠️ Possible Match: ${analysis.matchedFishId}</strong><br>
                        This koi might already be in your collection<br>
                        ${analysis.reasoning}<br>
                        <em style="opacity: 0.8;">Confidence: ${analysis.confidence}%</em>
                    </div>`;
                }
            } catch (error) {
                console.error('Photo analysis error:', error);
                analysisResult.innerHTML = '<div class="analysis-result error">⚠️ Network error analyzing photo. You can still add the fish manually.</div>';
            }
        }

        function renderFish() {
            const container = document.getElementById('fishContainer');
            const empty = document.getElementById('emptyState');
            const searchFilter = document.getElementById('searchFilter');
            
            const filtered = filterFishArray();

            if (allFish.length === 0) {
                empty.classList.remove('hidden');
                searchFilter.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            empty.classList.add('hidden');
            searchFilter.classList.remove('hidden');

            if (filtered.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: rgba(147, 197, 253, 0.5);">No matches found</div>';
                return;
            }

            container.innerHTML = filtered.map(fish => `
                <div class="fish-card" onclick="showDetail(${fish.id})">
                    ${fish.photoUrl ? `<img src="${fish.photoUrl}" class="fish-image" alt="${fish.name}">` : ''}
                    <div class="fish-name">${fish.name}</div>
                    <div class="fish-id">ID: ${fish.id}</div>
                    <div>
                        <span class="badge badge-breed">${fish.breed}</span>
                        ${fish.sightings && fish.sightings.length > 1 ? `<span class="badge badge-sightings">${fish.sightings.length} sightings</span>` : ''}
                    </div>
                    ${fish.markings ? `<div class="fish-markings">${fish.markings}</div>` : ''}
                </div>
            `).join('');
        }

        function filterFishArray() {
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const breed = document.getElementById('breedFilter')?.value || 'all';

            return allFish.filter(fish => {
                const matchesSearch = fish.name.toLowerCase().includes(search) || fish.id.toString().includes(search);
                const matchesBreed = breed === 'all' || fish.breed === breed;
                return matchesSearch && matchesBreed;
            });
        }

        function filterFish() {
            renderFish();
        }

        function showAddForm() {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('addFormView').classList.remove('hidden');
        }

        function showMainView() {
            document.getElementById('addFormView').classList.add('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            renderFish();
        }

        function showDetail(id) {
            currentSelectedId = id;
            const fish = allFish.find(f => f.id === id);
            if (!fish) return;

            document.getElementById('detailName').textContent = fish.name;
            document.getElementById('detailBreed').textContent = fish.breed;
            document.getElementById('detailFishId').textContent = fish.id;
            document.getElementById('detailDateAdded').textContent = fish.dateAdded;
            document.getElementById('detailSightings').textContent = fish.sightings?.length || 1;

            if (fish.photoUrl) {
                document.getElementById('detailImage').src = fish.photoUrl;
                document.getElementById('detailImage').classList.remove('hidden');
            } else {
                document.getElementById('detailImage').classList.add('hidden');
            }

            if (fish.markings) {
                document.getElementById('detailMarkings').textContent = fish.markings;
                document.getElementById('detailMarkingsSection').classList.remove('hidden');
            } else {
                document.getElementById('detailMarkingsSection').classList.add('hidden');
            }

            if (fish.notes) {
                document.getElementById('detailNotes').textContent = fish.notes;
                document.getElementById('detailNotesSection').classList.remove('hidden');
            } else {
                document.getElementById('detailNotesSection').classList.add('hidden');
            }

            if (fish.sightings && fish.sightings.length > 0) {
                document.getElementById('detailSightingsList').innerHTML = fish.sightings.map(s => 
                    `<div style="padding: 8px 0; border-bottom: 1px solid rgba(96, 165, 250, 0.1);">• ${s.date} - ${s.location}</div>`
                ).join('');
                document.getElementById('detailSightingsSection').classList.remove('hidden');
            } else {
                document.getElementById('detailSightingsSection').classList.add('hidden');
            }

            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('addFormView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
        }

        function logSighting() {
            const fish = allFish.find(f => f.id === currentSelectedId);
            if (fish) {
                if (!fish.sightings) fish.sightings = [];
                fish.sightings.push({
                    date: new Date().toLocaleDateString(),
                    location: 'Park'
                });
                localStorage.setItem('koiFish', JSON.stringify(allFish));
                showDetail(currentSelectedId);
            }
        }

        function deleteFish() {
            if (confirm('Are you sure you want to delete this fish?')) {
                allFish = allFish.filter(f => f.id !== currentSelectedId);
                localStorage.setItem('koiFish', JSON.stringify(allFish));
                showMainView();
            }
        }

        // Initial render
        showMainView();
    </script>
</body>
</html>
